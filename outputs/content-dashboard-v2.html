<!DOCTYPE html>

<style>

    --bg-primary: #FFFFFF;
    --bg-dark: #08131f;
    --bg-dark-2: #0d1f30;
    --bg-grey: #F7F8FA;
    --text-primary: #374151;
    --text-muted: #6B7280;
    --heading-dark: #0d1117;

    --accent-light: rgba(242, 101, 34, 0.10);
    --white: #FFFFFF;
    --border-light: #E5E7EB;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);

    --section-hook: #7c3aed;
    --section-hook-light: rgba(124, 58, 237, 0.08);

  /* ── Nav ── */

  .hero-subtitle { font-size: clamp(0.95rem,1.8vw,1.1rem); color: rgba(255,255,255,0.55); line-height: 1.7; max-width: 620px; margin: 0 auto; font-weight: 400; }

  .week-dot .dot-num { font-size: 1.25rem; font-weight: 800; color: rgba(255,255,255,0.8); margin: 3px 0; }

  .week-dot.past .dot-num { color: rgba(255,255,255,0.3); }
  .week-dot.past .dot-status { background: rgba(255,255,255,0.2); }
  .week-dot.today .dot-num { color: var(--accent); }

  .week-dot.upcoming .dot-num { color: rgba(255,255,255,0.7); }

  .content-type-chip.educate { background: rgba(59,130,246,0.1); color: #1e3a8a; border-color: rgba(59,130,246,0.22); }
  .content-type-chip.engage { background: rgba(139,92,246,0.1); color: #5b21b6; border-color: rgba(139,92,246,0.22); }
  .content-type-chip.proof { background: rgba(16,185,129,0.1); color: #064e3b; border-color: rgba(16,185,129,0.22); }
  .content-type-chip.community { background: rgba(242,101,34,0.1); color: #b74c0e; border-color: rgba(242,101,34,0.2); }

  .video-section:last-child { margin-bottom: 0; }

  .section-header:hover { background: var(--bg-grey); }
  .section-header.open { border-bottom: 1px solid var(--border-light); }
  .section-badge { font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; padding: 4px 10px; border-radius: 6px; white-space: nowrap; }

  .section-badge.main { background: var(--section-main-light); color: var(--section-main); border: 1px solid rgba(242,101,34,0.2); }
  .section-badge.cta { background: var(--section-cta-light); color: var(--section-cta); border: 1px solid rgba(5,150,105,0.2); }
  .section-info { flex: 1; }

  .avatar-dot.ugc { background: var(--section-hook); }

  .section-chevron { font-size: 0.8rem; color: var(--text-muted); transition: transform 0.2s; }

  .section-body { display: none; padding: 20px; }
  .section-body.open { display: block; }
  .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #9CA3AF; margin-bottom: 10px; }

  .meta-mini { display: flex; flex-direction: column; gap: 10px; }
  .meta-mini-item { display: flex; align-items: flex-start; gap: 8px; }

  .meta-mini-item strong { font-size: 0.78rem; font-weight: 600; color: var(--heading-dark); display: block; }

  /* ── Set Design Block ── */

  .set-design p { font-size: 0.78rem; color: var(--text-primary); line-height: 1.6; margin: 0; }
  .set-design ul { list-style: none; margin: 0; padding: 0; }
  .set-design li { font-size: 0.78rem; color: var(--text-primary); line-height: 1.6; padding: 3px 0; padding-left: 16px; position: relative; }
  .set-design li::before { content: ''; position: absolute; left: 0; top: 10px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.5; }

  /* ── Editing Block ── */
  .editing-block { background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 100%); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .editing-block h5 { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 8px; }
  .editing-block p, .editing-block li { font-size: 0.78rem; color: rgba(255,255,255,0.75); line-height: 1.6; }
  .editing-block ul { list-style: none; margin: 0; padding: 0; }
  .editing-block li { padding: 3px 0; padding-left: 16px; position: relative; }
  .editing-block li::before { content: ''; position: absolute; left: 0; top: 10px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  /* ── Prompt Cards (for AI Video product) ── */
  .section-prompts { border-top: 1px solid var(--border-light); padding: 16px 20px; background: #fafbfc; }
  .transition-card { background: var(--bg-grey); border: 1px solid var(--border-light); border-radius: 12px; overflow: hidden; transition: all 0.2s; cursor: pointer; margin-bottom: 8px; }
  .transition-card:last-child { margin-bottom: 0; }
  .transition-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
  .transition-card.copied { border-color: var(--accent); background: rgba(242,101,34,0.03); }
  .transition-card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border-light); background: linear-gradient(135deg,#fff7f3 0%,var(--bg-grey) 100%); }
  .transition-panels { display: flex; align-items: center; gap: 6px; }

  .panel-arrow { color: var(--text-muted); font-size: 0.75rem; }

  .model-info strong { font-size: 0.78rem; font-weight: 700; color: #fff; display: block; }

  /* ── Responsive ── */
  @media (max-width: 1024px) { .section-grid { grid-template-columns: 1fr; } }
  @media (max-width: 768px) {
    .nav-inner { height: auto; padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
    .product-tabs { order: 3; width: 100%; justify-content: center; }
    .hero-header { padding: 32px 0 44px; }
    .hero-content { padding: 0 16px; }
    .main-content { padding: 24px 16px 64px; }
    .card-header { padding: 20px; flex-wrap: wrap; }
    .card-header-right { margin-left: 0; margin-top: 8px; }
    .video-timeline { padding: 20px; }
    .section-header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }

    .footer-inner { flex-direction: column; gap: 8px; text-align: center; }
  }
  @media (max-width: 480px) {
    .week-strip { gap: 2px; padding: 4px; }
    .week-dot { padding: 8px 2px; }
    .week-dot .dot-num { font-size: 1rem; }
    .product-tab { padding: 6px 10px; font-size: 0.68rem; }
  }
</style>

// ── State ──
let activeProduct = 'ai-video';
let activeDay = 0;
let openSections = {};

function getWeekStartDate() {
  const stored = localStorage.getItem('contentPlanV2StartDate');
  if (stored) return new Date(stored);
  const today = new Date(); const dow = today.getDay();
  const diff = dow === 0 ? 1 : (dow === 1 ? 0 : 8 - dow);
  const mon = new Date(today); mon.setDate(today.getDate() + diff); mon.setHours(0,0,0,0);
  localStorage.setItem('contentPlanV2StartDate', mon.toISOString());
  return mon;
}
function formatDate(d) { const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; const w=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']; return `${w[d.getDay()]}, ${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`; }
function getDayStatus(i) { const ws=getWeekStartDate(); const dd=new Date(ws); dd.setDate(ws.getDate()+i); const t=new Date(); t.setHours(0,0,0,0); dd.setHours(0,0,0,0); if(dd.getTime()===t.getTime()) return 'today'; return dd<t?'past':'upcoming'; }
function getTodayIndex() { const ws=getWeekStartDate(); const t=new Date(); t.setHours(0,0,0,0); const s=new Date(ws); s.setHours(0,0,0,0); const d=Math.floor((t-s)/(864e5)); if(d>=0&&d<7) return d; return d<0?0:6; }

function switchProduct(product) {
  activeProduct = product;
  activeDay = getTodayIndex();
  openSections = {};
  document.querySelectorAll('.product-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[onclick="switchProduct('${product}')"]`).classList.add('active');
  const p = PRODUCTS[product];
  document.getElementById('heroEyebrow').innerHTML = `<span class="eyebrow-dot"></span>${p.eyebrow}`;
  document.getElementById('heroTitle').innerHTML = p.title;
  document.getElementById('heroSubtitle').textContent = p.subtitle;
  render();
}

function toggleSection(dayIdx, secIdx) {
  const key = `${activeProduct}-${dayIdx}-${secIdx}`;
  openSections[key] = !openSections[key];
  render();
}

function render() {
  const plan = PRODUCTS[activeProduct].plan;
  document.getElementById('topDate').innerHTML = `<strong>${formatDate(new Date())}</strong>`;

  // Week strip
  const weekEl = document.getElementById('weekOverview');
  const ws = getWeekStartDate();
  const dn = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  weekEl.innerHTML = '';
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(ws.getDate()+i);
    const st=getDayStatus(i);
    const dot=document.createElement('div');
    dot.className=`week-dot ${st} ${i===activeDay?'active':''}`;
    dot.onclick=()=>{activeDay=i;openSections={};render();};
    dot.innerHTML=`<div class="dot-day">${dn[i]}</div><div class="dot-num">${d.getDate()}</div><div class="dot-status"></div>`;
    weekEl.appendChild(dot);
  }

  const container = document.getElementById('cardsContainer');
  const c = plan[activeDay];
  const st = getDayStatus(activeDay);
  const sl = st==='today'?'Today':st==='past'?'Done':'Upcoming';

  const icons = {
    educate:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>',
    engage:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>',
    proof:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    community:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    pain:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    demo:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>'
  };

  let sectionsHTML = '';
  c.sections.forEach((sec, si) => {
    const isOpen = openSections[`${activeProduct}-${activeDay}-${si}`];
    const avatarDotClass = sec.avatarType || 'real';

    let bodyContent = '<div class="section-grid"><div>';

    // Script
    bodyContent += `<div class="section-label">Script</div>
      <div class="script-block"><p>${sec.script.replace(/\n/g,'<br>')}</p></div>`;

    // Key points
    if (sec.keyPoints) {
      bodyContent += `<div class="section-label" style="margin-top:16px">Key Points</div>
        <div class="meta-mini">${sec.keyPoints.map(kp => `<div class="meta-mini-item"><span class="icon">&#9679;</span><div><p>${kp}</p></div></div>`).join('')}</div>`;
    }
    bodyContent += '</div><div>';

    // TikTok Format (for Gen Z hooks)
    if (sec.tiktokFormat) {
      bodyContent += `<div style="background:linear-gradient(135deg,#7c3aed10,#7c3aed05);border:1px solid rgba(124,58,237,0.2);border-radius:12px;padding:16px;margin-bottom:12px">
        <h5 style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#7c3aed;margin-bottom:8px">TikTok Trend Format</h5>
        <p style="font-size:0.78rem;color:var(--text-primary);line-height:1.6;margin:0">${sec.tiktokFormat}</p>
      </div>`;
    }

    // Set Design (for AIOS/real shoots)
    if (sec.setDesign) {
      bodyContent += `<div class="set-design"><h5>Set Design</h5><ul>`;
      if (sec.setDesign.location) bodyContent += `<li><strong>Location:</strong> ${sec.setDesign.location}</li>`;
      if (sec.setDesign.lighting) bodyContent += `<li><strong>Lighting:</strong> ${sec.setDesign.lighting}</li>`;
      if (sec.setDesign.props) bodyContent += `<li><strong>Props:</strong> ${sec.setDesign.props}</li>`;
      if (sec.setDesign.wardrobe) bodyContent += `<li><strong>Wardrobe:</strong> ${sec.setDesign.wardrobe}</li>`;
      if (sec.setDesign.camera) bodyContent += `<li><strong>Camera:</strong> ${sec.setDesign.camera}</li>`;
      if (sec.setDesign.framing) bodyContent += `<li><strong>Framing:</strong> ${sec.setDesign.framing}</li>`;
      bodyContent += `</ul></div>`;
    }

    // Editing & Transitions (for AIOS/real shoots)
    if (sec.editing) {
      bodyContent += `<div class="editing-block"><h5>Editing & Transitions</h5><ul>`;
      if (sec.editing.cuts) bodyContent += `<li><strong>Cuts:</strong> ${sec.editing.cuts}</li>`;
      if (sec.editing.transitions) bodyContent += `<li><strong>Transitions:</strong> ${sec.editing.transitions}</li>`;
      if (sec.editing.text) bodyContent += `<li><strong>On-Screen Text:</strong> ${sec.editing.text}</li>`;
      if (sec.editing.sound) bodyContent += `<li><strong>Sound Design:</strong> ${sec.editing.sound}</li>`;
      if (sec.editing.pacing) bodyContent += `<li><strong>Pacing:</strong> ${sec.editing.pacing}</li>`;
      bodyContent += `</ul></div>`;
    }

    // Meta info (music, hook, duration)
    bodyContent += `<div class="meta-mini" style="margin-top:12px">`;
    if (sec.hookText) bodyContent += `<div class="meta-mini-item"><span class="icon">&#128172;</span><div><strong>Hook Text</strong><p>"${sec.hookText}"</p></div></div>`;
    if (sec.music) bodyContent += `<div class="meta-mini-item"><span class="icon">&#127925;</span><div><strong>Music</strong><p>${sec.music}</p></div></div>`;
    bodyContent += `<div class="meta-mini-item"><span class="icon">&#9202;</span><div><strong>Duration</strong><p>${sec.duration}</p></div></div>`;
    bodyContent += `</div>`;

    bodyContent += '</div></div>';

    // Nano Banana / I2V prompts (for AI Video product only)
    if (sec.nanoPrompts || sec.i2vClips) {
      let promptCards = '';
      if (sec.nanoPrompts) {
        promptCards += `<div class="model-info"><span class="model-info-icon">&#127912;</span><div><strong>Nano Banana — Image Generation</strong><p>Click to copy</p></div></div>`;
        sec.nanoPrompts.forEach((np, ni) => {
          promptCards += `<div class="transition-card" onclick="copyPrompt(this, ${activeDay}, ${si}, 'nano', ${ni})">
            <div class="transition-card-header"><div class="transition-panels"><span class="panel-num">STEP ${np.step}</span><span class="transition-label">${np.label}</span></div><span class="transition-copy-hint">Click to copy</span></div>
            <div class="transition-card-body"><p>${np.prompt.substring(0, 180)}...</p></div></div>`;
        });
      }
      if (sec.i2vClips) {
        const totalDur = sec.i2vClips.reduce((s,cl) => s + cl.duration, 0);
        promptCards += `<div class="model-info" style="margin-top:12px"><span class="model-info-icon">&#127916;</span><div><strong>Veo 3.1 — Image to Video</strong><p>${sec.i2vClips.length} clips = ~${totalDur}s</p></div></div>`;
        sec.i2vClips.forEach((cl, ci) => {
          promptCards += `<div class="transition-card" onclick="copyPrompt(this, ${activeDay}, ${si}, 'i2v', ${ci})">
            <div class="transition-card-header"><div class="transition-panels"><span class="panel-num">CLIP ${ci+1}</span><span class="transition-label">${cl.label}</span><span class="panel-arrow">|</span><span class="panel-num">Panels ${cl.panels}</span></div><span class="transition-copy-hint">Click to copy</span></div>
            <div class="transition-card-body"><p>${cl.motion.substring(0, 180)}...</p>
              <div class="f2v-specs"><div class="f2v-spec"><span>Upload </span>Panel ${cl.inputPanel}</div><div class="f2v-spec"><span>Duration </span>${cl.duration}s</div><div class="f2v-spec"><span>Lip-sync </span>${cl.lipSync || 'No'}</div></div>
            </div></div>`;
        });
      }
      bodyContent += `<div class="section-prompts">${promptCards}</div>`;
    }

    sectionsHTML += `
      <div class="video-section">
        <div class="section-header ${isOpen?'open':''}" onclick="toggleSection(${activeDay},${si})">
          <span class="section-badge ${sec.type}">${sec.type.toUpperCase()}</span>
          <div class="section-info"><h4>${sec.title}</h4><p>${sec.description}</p></div>
          <div class="section-avatar"><span class="avatar-dot ${avatarDotClass}"></span>${sec.avatar || ''}</div>
          <div class="section-time">${sec.duration}</div>
          <span class="section-chevron">&#9660;</span>
        </div>
        <div class="section-body ${isOpen?'open':''}">${bodyContent}</div>
      </div>`;
  });

  container.innerHTML = `
    <div class="day-card">
      <div class="card-header">
        <div class="card-icon">${icons[c.contentType]||icons.educate}</div>
        <div class="card-header-text"><h2>${c.day} — ${c.title}</h2><p>Full video plan &middot; ${c.totalDuration}</p></div>
        <div class="card-header-right">
          <span class="content-type-chip ${c.contentType}">${c.contentTypeLabel}</span>
          <span class="status-badge ${st}">${sl}</span>
        </div>
      </div>
      <div class="video-timeline">
        <div class="timeline-header"><h3>Video Sections</h3><span class="timeline-total">${c.sections.length} sections &middot; ${c.totalDuration}</span></div>
        ${sectionsHTML}
      </div>
    </div>`;
}

function copyPrompt(el, dayIdx, secIdx, type, promptIdx) {
  const plan = PRODUCTS[activeProduct].plan;
  const sec = plan[dayIdx].sections[secIdx];
  let text = '';
  if (type === 'nano') text = sec.nanoPrompts[promptIdx].prompt;
  else if (type === 'i2v') text = sec.i2vClips[promptIdx].motion;
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    const hint = el.querySelector('.transition-copy-hint');
    hint.textContent = 'Copied!';
    setTimeout(() => { el.classList.remove('copied'); hint.textContent = 'Click to copy'; }, 2000);
  });
}

activeDay = getTodayIndex();
render();
</script>
</body>
</html>
