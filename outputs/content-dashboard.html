<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Dashboard — Adletic Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FFFFFF;
    --bg-dark: #08131f;
    --bg-dark-2: #0d1f30;
    --bg-grey: #F7F8FA;
    --text-primary: #374151;
    --text-muted: #6B7280;
    --heading-dark: #0d1117;
    --accent: #f26522;
    --accent-hover: #d9541a;
    --accent-light: rgba(242, 101, 34, 0.10);
    --white: #FFFFFF;
    --border-light: #E5E7EB;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 32px rgba(0,0,0,0.10);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg-grey); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

  /* Navigation */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 4px 20px rgba(0,0,0,0.06);
  }
  .nav-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 24px;
    height: 72px; display: flex; align-items: center; justify-content: space-between; gap: 32px;
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 0.92rem; font-weight: 700; color: var(--heading-dark); letter-spacing: -0.01em; }
  .nav-logo { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--white); font-weight: 800; font-size: 0.85rem; flex-shrink: 0; }
  .nav-date { font-size: 0.875rem; font-weight: 500; color: var(--text-muted); }
  .nav-date strong { color: var(--heading-dark); }

  /* Hero */
  .hero-header { background: var(--bg-dark); padding: 48px 0 56px; position: relative; overflow: hidden; }
  .hero-header::before { content: ''; position: absolute; right: -80px; top: -80px; width: 300px; height: 300px; background: var(--accent); opacity: 0.06; border-radius: 50%; }
  .hero-header::after { content: ''; position: absolute; left: -40px; bottom: -60px; width: 200px; height: 200px; background: var(--accent); opacity: 0.04; border-radius: 50%; }
  .hero-content { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 2; text-align: center; }
  .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.58); margin-bottom: 20px; }
  .eyebrow-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse-dot 2.5s ease-in-out infinite; }
  @keyframes pulse-dot { 0%, 100% { box-shadow: 0 0 0 0 rgba(242,101,34,0.7); } 50% { box-shadow: 0 0 0 8px rgba(242,101,34,0); } }
  .hero-title { font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; color: #fff; line-height: 1.12; letter-spacing: -0.03em; margin-bottom: 12px; }
  .hero-title-accent { color: var(--accent); }
  .hero-subtitle { font-size: clamp(0.95rem, 1.8vw, 1.1rem); color: rgba(255,255,255,0.55); line-height: 1.7; max-width: 560px; margin: 0 auto; font-weight: 400; }

  /* Week Strip */
  .week-section { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .week-strip {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    margin: -28px auto 32px; position: relative; z-index: 10;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 6px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); max-width: 680px;
  }
  .week-dot { text-align: center; padding: 12px 4px; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; border: 1.5px solid transparent; }
  .week-dot:hover { background: rgba(255,255,255,0.08); }
  .week-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 4px 12px rgba(242,101,34,0.3); }
  .week-dot.active .dot-day, .week-dot.active .dot-num { color: #fff !important; }
  .week-dot.active .dot-status { background: #fff !important; }
  .week-dot .dot-day { font-size: 0.62rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; }
  .week-dot .dot-num { font-size: 1.25rem; font-weight: 800; color: rgba(255,255,255,0.8); margin: 3px 0; letter-spacing: -0.02em; }
  .week-dot .dot-status { width: 6px; height: 6px; border-radius: 50%; margin: 0 auto; }
  .week-dot.past .dot-num { color: rgba(255,255,255,0.3); }
  .week-dot.past .dot-status { background: rgba(255,255,255,0.2); }
  .week-dot.today .dot-num { color: var(--accent); }
  .week-dot.today .dot-status { background: var(--accent); }
  .week-dot.upcoming .dot-num { color: rgba(255,255,255,0.7); }
  .week-dot.upcoming .dot-status { background: rgba(255,255,255,0.3); }

  /* Main */
  .main-content { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

  /* Day Card */
  .day-card { background: var(--white); border: 1px solid var(--border-light); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-sm); }

  /* Card Header */
  .card-header { display: flex; align-items: flex-start; gap: 14px; padding: 28px 28px 24px; border-bottom: 1px solid var(--border-light); background: linear-gradient(135deg, #fff7f3 0%, #fff 100%); }
  .card-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: rgba(242,101,34,0.12); color: var(--accent); font-size: 1.2rem; }
  .card-header-text h2 { font-size: 1.15rem; font-weight: 700; color: var(--heading-dark); letter-spacing: -0.015em; margin-bottom: 4px; line-height: 1.3; }
  .card-header-text p { font-size: 0.82rem; color: var(--text-muted); line-height: 1.45; margin: 0; }
  .card-header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; align-self: center; }
  .status-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; border-radius: 100px; padding: 4px 12px; white-space: nowrap; }
  .status-badge.today { color: #fff; background: var(--accent); }
  .status-badge.past { color: #065f46; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.22); }
  .status-badge.upcoming { color: #1e3a8a; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.22); }
  .content-type-chip { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 100px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.02em; border: 1px solid transparent; white-space: nowrap; }
  .content-type-chip.educate { background: rgba(59,130,246,0.1); color: #1e3a8a; border-color: rgba(59,130,246,0.22); }
  .content-type-chip.engage { background: rgba(139,92,246,0.1); color: #5b21b6; border-color: rgba(139,92,246,0.22); }
  .content-type-chip.proof { background: rgba(16,185,129,0.1); color: #064e3b; border-color: rgba(16,185,129,0.22); }
  .content-type-chip.community { background: rgba(242,101,34,0.1); color: #b74c0e; border-color: rgba(242,101,34,0.2); }

  /* Card Body 2-col */
  .card-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .card-left { padding: 24px 28px; border-right: 1px solid var(--border-light); }
  .card-right { padding: 24px 28px; display: flex; flex-direction: column; }

  .section-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: #9CA3AF; margin-bottom: 16px; }
  .framework-badge { display: inline-block; font-size: 0.68rem; font-weight: 800; color: var(--accent); background: var(--accent-light); border: 1px solid rgba(242,101,34,0.2); border-radius: 100px; padding: 4px 12px; margin-bottom: 18px; letter-spacing: 0.02em; }

  .meta-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
  .meta-item { display: flex; align-items: flex-start; gap: 10px; }
  .meta-item-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; line-height: 1; }
  .meta-item strong { display: block; font-size: 0.82rem; font-weight: 600; color: var(--heading-dark); margin-bottom: 1px; }
  .meta-item p { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; margin: 0; }

  .script-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; border: 1.5px solid var(--accent); border-radius: 8px; cursor: pointer; transition: all 0.2s ease; background: transparent; color: var(--accent); margin-top: 4px; }
  .script-toggle:hover { background: var(--accent); color: var(--white); transform: translateY(-2px); }
  .script-box { display: none; margin-top: 16px; padding: 20px; background: var(--bg-grey); border: 1px solid var(--border-light); border-radius: 14px; }
  .script-box.open { display: block; }
  .script-box p { font-size: 0.875rem; line-height: 1.85; color: var(--text-primary); font-style: italic; }
  .script-cta { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-light); font-size: 0.82rem; font-weight: 600; color: var(--accent); font-style: normal; }

  /* Checklist */
  .checklist { list-style: none; display: flex; flex-direction: column; gap: 0; flex: 1; }
  .checklist li { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #F3F4F6; }
  .checklist li:last-child { border-bottom: none; }
  .checklist input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; min-width: 20px; border: 2px solid var(--border-light); border-radius: 6px; cursor: pointer; margin-top: 2px; transition: all 0.2s; position: relative; background: var(--white); }
  .checklist input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
  .checklist input[type="checkbox"]:checked::after { content: ''; position: absolute; left: 5px; top: 1px; width: 6px; height: 10px; border: solid var(--white); border-width: 0 2px 2px 0; transform: rotate(45deg); }
  .checklist label { cursor: pointer; line-height: 1.4; flex: 1; }
  .checklist label .task-title { font-size: 0.82rem; color: var(--heading-dark); font-weight: 600; display: block; margin-bottom: 1px; }
  .checklist label .task-detail { font-size: 0.75rem; color: var(--text-muted); display: block; }
  .checklist input[type="checkbox"]:checked + label .task-title { color: #9CA3AF; text-decoration: line-through; }
  .checklist input[type="checkbox"]:checked + label .task-detail { color: #D1D5DB; }
  .progress-wrap { margin-top: auto; padding-top: 16px; }
  .progress-bar { width: 100%; height: 4px; background: #F3F4F6; border-radius: 2px; overflow: hidden; }
  .progress-bar .fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .progress-text { font-size: 0.72rem; color: var(--text-muted); margin-top: 6px; text-align: right; font-weight: 600; }

  /* ── Prompts Section ── */
  .prompts-section { border-top: 1px solid var(--border-light); padding: 28px; }
  .prompts-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .prompts-section-header h3 { font-size: 1.05rem; font-weight: 700; color: var(--heading-dark); letter-spacing: -0.01em; }

  /* Prompt Tabs — matches website pricing-tabs */
  .prompt-tabs {
    display: flex; background: var(--bg-grey); border: 1px solid var(--border-light);
    border-radius: 14px; padding: 5px; margin-bottom: 24px; gap: 4px;
  }
  .prompt-tab {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 11px 14px; border: none; border-radius: 10px; background: transparent;
    color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 0.82rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
  }
  .prompt-tab.active { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(242,101,34,0.3); }
  .prompt-tab:not(.active):hover { background: var(--white); color: var(--heading-dark); }
  .prompt-tab .tab-icon { font-size: 0.95rem; }

  /* Nano Banana — single prompt */
  .nano-prompt-box {
    background: var(--bg-grey); border: 1px solid var(--border-light); border-radius: 14px;
    padding: 24px; position: relative; cursor: pointer; transition: all 0.2s ease;
  }
  .nano-prompt-box:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
  .nano-prompt-box .copy-btn {
    position: absolute; right: 16px; top: 16px; font-size: 0.65rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
    background: var(--white); border: 1px solid var(--border-light); border-radius: 6px;
    padding: 5px 10px; cursor: pointer; transition: all 0.2s;
  }
  .nano-prompt-box:hover .copy-btn { color: var(--accent); border-color: var(--accent); }
  .nano-prompt-box.copied { border-color: var(--accent); background: rgba(242,101,34,0.03); }
  .nano-prompt-box.copied .copy-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
  .nano-prompt-box p { font-size: 0.8rem; color: var(--text-primary); line-height: 1.7; white-space: pre-wrap; }
  .nano-prompt-box .panel-label { color: var(--accent); font-weight: 700; }
  .nano-prompt-box .hook-label { color: var(--accent); font-weight: 800; background: var(--accent-light); padding: 1px 6px; border-radius: 4px; font-size: 0.72rem; }

  /* Video Transitions */
  .transitions-grid { display: flex; flex-direction: column; gap: 12px; }
  .transition-card {
    background: var(--bg-grey); border: 1px solid var(--border-light); border-radius: 14px;
    overflow: hidden; transition: all 0.2s ease; cursor: pointer;
  }
  .transition-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
  .transition-card.copied { border-color: var(--accent); background: rgba(242,101,34,0.03); }
  .transition-card-header {
    display: flex; align-items: center; justify-content: space-between; padding: 14px 18px;
    border-bottom: 1px solid var(--border-light); background: linear-gradient(135deg, #fff7f3 0%, var(--bg-grey) 100%);
  }
  .transition-panels { display: flex; align-items: center; gap: 8px; }
  .panel-num {
    font-size: 0.68rem; font-weight: 800; color: var(--accent);
    background: var(--accent-light); border: 1px solid rgba(242,101,34,0.2);
    border-radius: 6px; padding: 3px 8px; letter-spacing: 0.04em;
  }
  .panel-arrow { color: var(--text-muted); font-size: 0.8rem; }
  .transition-label { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .transition-copy-hint {
    font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted); opacity: 0; transition: opacity 0.2s;
  }
  .transition-card:hover .transition-copy-hint { opacity: 1; }
  .transition-card.copied .transition-copy-hint { opacity: 1; color: var(--accent); }
  .transition-card-body { padding: 14px 18px; }
  .transition-card-body p { font-size: 0.8rem; color: var(--text-primary); line-height: 1.65; margin: 0; }

  /* F2V specs row */
  .f2v-specs {
    display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
  }
  .f2v-spec {
    font-size: 0.68rem; font-weight: 700; padding: 4px 10px;
    background: var(--white); border: 1px solid var(--border-light);
    border-radius: 6px; color: var(--heading-dark);
  }
  .f2v-spec span { color: var(--text-muted); font-weight: 500; }

  /* Model info banner */
  .model-info {
    display: flex; align-items: center; gap: 12px; padding: 14px 18px;
    background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 100%);
    border-radius: 12px; margin-bottom: 16px;
  }
  .model-info-icon { font-size: 1.1rem; }
  .model-info strong { font-size: 0.82rem; font-weight: 700; color: #fff; display: block; margin-bottom: 1px; }
  .model-info p { font-size: 0.72rem; color: rgba(255,255,255,0.5); margin: 0; line-height: 1.4; }

  /* Footer */
  .footer { background: var(--heading-dark); padding: 32px 0; }
  .footer-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
  .footer p { font-size: 0.8rem; color: rgba(255,255,255,0.3); margin: 0; }
  .footer a { color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s ease; }
  .footer a:hover { color: var(--accent); }

  /* Responsive */
  @media (max-width: 1024px) {
    .card-body { grid-template-columns: 1fr; }
    .card-left { border-right: none; border-bottom: 1px solid var(--border-light); }
  }
  @media (max-width: 768px) {
    .nav-inner { height: 60px; padding: 0 16px; }
    .hero-header { padding: 32px 0 44px; }
    .hero-content { padding: 0 16px; }
    .week-strip { margin-top: -24px; }
    .main-content { padding: 24px 16px 64px; }
    .card-header { padding: 20px; flex-wrap: wrap; }
    .card-header-right { margin-left: 0; margin-top: 8px; }
    .card-left, .card-right { padding: 20px; }
    .prompts-section { padding: 20px; }
    .prompt-tabs { flex-wrap: wrap; }
    .prompt-tab { font-size: 0.75rem; padding: 9px 10px; }
    .footer-inner { flex-direction: column; gap: 8px; text-align: center; }
  }
  @media (max-width: 480px) {
    .week-strip { gap: 2px; padding: 4px; }
    .week-dot { padding: 8px 2px; }
    .week-dot .dot-num { font-size: 1rem; }
    .hero-title { font-size: clamp(1.6rem, 7vw, 2.2rem); }
  }
</style>
</head>

<script>

      { panels: 'avatar', panelCount: 1, label: 'AVATAR',

// ── Utility functions ──
function getWeekStartDate() {
  const stored = localStorage.getItem('contentPlanStartDate');
  if (stored) return new Date(stored);
  const today = new Date(); const dow = today.getDay();
  const diff = dow === 0 ? 1 : (dow === 1 ? 0 : 8 - dow);
  const mon = new Date(today); mon.setDate(today.getDate() + diff); mon.setHours(0,0,0,0);
  localStorage.setItem('contentPlanStartDate', mon.toISOString());
  return mon;
}
function getCheckboxState() { const s = localStorage.getItem('contentPlanChecks3'); return s ? JSON.parse(s) : {}; }
function saveCheckboxState(state) { localStorage.setItem('contentPlanChecks3', JSON.stringify(state)); }
function formatDate(d) { const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; const w=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']; return `${w[d.getDay()]}, ${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`; }
function formatShort(d) { const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${d.getDate()} ${m[d.getMonth()]}`; }
function getDayStatus(i) { const ws=getWeekStartDate(); const dd=new Date(ws); dd.setDate(ws.getDate()+i); const t=new Date(); t.setHours(0,0,0,0); dd.setHours(0,0,0,0); if(dd.getTime()===t.getTime()) return 'today'; return dd<t?'past':'upcoming'; }
function getTodayIndex() { const ws=getWeekStartDate(); const t=new Date(); t.setHours(0,0,0,0); const s=new Date(ws); s.setHours(0,0,0,0); const d=Math.floor((t-s)/(864e5)); if(d>=0&&d<7) return d; return d<0?0:6; }

let activeDay = getTodayIndex();

function formatNanoPrompt(text) {
  return text
    .replace(/PANEL (\d) \(HOOK\):/g, '<br><span class="hook-label">HOOK</span> <span class="panel-label">PANEL $1:</span>')
    .replace(/PANEL (\d):/g, '<br><span class="panel-label">PANEL $1:</span>')
    .replace(/Location:/g, '<br><strong>Location:</strong>')
    .replace(/Subject:/g, '<br><strong>Subject:</strong>');
}

function switchTab(tab) { activePromptTab = tab; render(); }

function toggleCheck(cid) { const s=getCheckboxState(); s[cid]=!s[cid]; saveCheckboxState(s); render(); }

function copySora2(el, di) {
  navigator.clipboard.writeText(CONTENT_PLAN[di].sora2Prompt).then(() => {
    el.classList.add('copied'); el.querySelector('.copy-btn').textContent = 'Copied!';
    setTimeout(() => { el.classList.remove('copied'); el.querySelector('.copy-btn').textContent = 'Click to copy'; }, 2000);
  });
}

function copyTransition(el, type, di, ti) {
  const text = type === 'nano'
    ? CONTENT_PLAN[di].nanoPrompts[ti].prompt

    : type === 'i2v'
    ? CONTENT_PLAN[di].i2vClips[ti].motion
    : CONTENT_PLAN[di].f2vTransitions[ti].transition;
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    const hint = el.querySelector('.transition-copy-hint');
    hint.textContent = 'Copied!';
    setTimeout(() => { el.classList.remove('copied'); hint.textContent = 'Click to copy'; }, 2000);
  });
}
